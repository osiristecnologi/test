<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Coinhat-Feeds — Memecoins Solana</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════
   COINHAT-FEEDS — COMPLETE STYLESHEET
═══════════════════════════════════ */
:root{
  --bg:#f4f7fc;
  --card:#ffffff;
  --yellow:#f7c600;
  --yellow-lt:#fff9e0;
  --yellow-dk:#d4a800;
  --blue:#1a6bff;
  --blue-lt:#e8f0ff;
  --blue-dk:#0d4fd4;
  --green:#16c784;
  --red:#ea3943;
  --text:#111827;
  --t2:#374151;
  --t3:#6b7280;
  --t4:#9ca3af;
  --border:rgba(0,0,0,0.07);
  --shadow:0 2px 20px rgba(0,0,0,0.06);
  --shadow-lg:0 8px 40px rgba(26,107,255,0.13);
  --r:16px;
  --r-sm:10px;
  --glass:rgba(255,255,255,0.78);
  --glass-b:rgba(255,255,255,0.55);
  --hh:106px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--yellow);border-radius:99px}

/* TOAST */
#toasts{position:fixed;bottom:24px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:11px 18px;border-radius:var(--r-sm);font-size:.83rem;font-weight:500;pointer-events:auto;opacity:0;transform:translateY(10px) scale(.97);transition:opacity .28s,transform .28s;box-shadow:0 4px 20px rgba(0,0,0,.18);max-width:260px;border-left:3px solid var(--yellow)}
.toast.show{opacity:1;transform:translateY(0) scale(1)}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
.toast.info{border-color:var(--blue)}

/* ── HEADER ── */
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);border-bottom:1px solid var(--glass-b);box-shadow:0 1px 20px rgba(0,0,0,.05)}
.h-inner{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;gap:10px}
.h-left{display:flex;align-items:center;gap:11px}
.h-right{display:flex;align-items:center;gap:8px}

.hamburger{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;padding:7px;border-radius:var(--r-sm);transition:background .2s}
.hamburger:hover{background:var(--yellow-lt)}
.hamburger span{display:block;height:2px;background:var(--text);border-radius:2px;transition:transform .3s,opacity .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

.brand{display:flex;align-items:center;gap:8px}
.brand-logo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--yellow)}
.brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.08rem;letter-spacing:-.4px;line-height:1}
.brand-accent{color:var(--blue)}

/* SEARCH */
.search-wrap{position:relative;display:flex;align-items:center}
.search-input{width:0;opacity:0;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:.875rem;color:var(--text);background:var(--card);outline:none;transition:width .35s cubic-bezier(.4,0,.2,1),opacity .3s,border-color .2s;pointer-events:none}
.search-wrap.open .search-input{width:200px;opacity:1;pointer-events:all;border-color:var(--blue)}
@media(max-width:380px){.search-wrap.open .search-input{width:155px}}
.search-input:focus{border-color:var(--blue)}
.search-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--yellow);border-radius:var(--r-sm);font-size:1rem;flex-shrink:0;transition:background .2s,transform .15s}
.search-btn:hover{background:var(--yellow-dk);transform:scale(1.05)}
.search-drop{position:absolute;top:calc(100% + 8px);right:0;width:290px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);overflow:hidden;display:none;z-index:200;animation:fadeDown .2s ease}
.search-drop.vis{display:block}
.s-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;font-size:.875rem}
.s-item:hover{background:var(--yellow-lt)}
.s-item img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#eee}
.s-name{font-weight:600}
.s-sym{color:var(--t3);font-size:.73rem}
.s-price{margin-left:auto;font-weight:600;font-size:.8rem}

/* ── TICKER ── */
.ticker-bar{overflow:hidden;border-top:1px solid rgba(247,198,0,.25);background:linear-gradient(90deg,rgba(247,198,0,.12),rgba(247,198,0,.04),rgba(247,198,0,.12));padding:5px 0}
.ticker-track{display:flex;align-items:center;gap:0;white-space:nowrap;animation:ticker 35s linear infinite}
.ticker-track:hover{animation-play-state:paused}
.ticker-item{display:inline-flex;align-items:center;gap:7px;padding:3px 18px;font-size:.78rem;font-weight:600;border-right:1px solid rgba(0,0,0,.06);cursor:pointer;transition:background .15s}
.ticker-item:hover{background:rgba(247,198,0,.15)}
.ti-sym{color:var(--text);font-family:'Syne',sans-serif;font-weight:700}
.ti-price{color:var(--t2)}
.ti-chg{font-weight:600}
.ti-chg.up{color:var(--green)}
.ti-chg.dn{color:var(--red)}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── MENU OVERLAY ── */
.menu-overlay{position:fixed;inset:0;z-index:500;visibility:hidden;pointer-events:none}
.menu-overlay.open{visibility:visible;pointer-events:all}
.menu-backdrop{position:absolute;inset:0;background:rgba(17,24,39,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;transition:opacity .35s}
.menu-overlay.open .menu-backdrop{opacity:1}
.menu-panel{position:absolute;top:0;left:0;bottom:0;width:min(300px,88vw);background:var(--card);box-shadow:4px 0 40px rgba(0,0,0,.14);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.menu-overlay.open .menu-panel{transform:translateX(0)}
.menu-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 16px;border-bottom:1px solid var(--border)}
.menu-brand{display:flex;align-items:center;gap:10px}
.menu-brand-logo{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2.5px solid var(--yellow)}
.menu-brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;letter-spacing:-.3px}
.menu-close-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--bg);font-size:.9rem;transition:background .2s}
.menu-close-btn:hover{background:var(--yellow-lt)}
.menu-nav{flex:1;overflow-y:auto;padding:12px 12px}
.menu-item{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:var(--r-sm);cursor:pointer;transition:background .18s,transform .15s;font-size:.94rem;font-weight:500;margin-bottom:3px;position:relative}
.menu-item:hover{background:var(--yellow-lt);transform:translateX(3px)}
.menu-item.active{background:var(--yellow-lt);color:var(--blue)}
.menu-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--yellow);border-radius:99px}
.mi-icon{font-size:1.2rem;width:26px;text-align:center}
.mi-label{flex:1;font-family:'Syne',sans-serif;font-weight:600}
.mi-arrow{color:var(--t3);font-size:1.1rem}
.mi-badge{background:var(--yellow);color:var(--text);font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.5px}
.menu-footer{padding:16px 20px;border-top:1px solid var(--border)}
.menu-tagline{font-size:.8rem;color:var(--t3);margin-bottom:10px}
.menu-tagline strong{color:var(--blue)}
.menu-socials{display:flex;gap:8px}
.soc-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px;font-size:.9rem;transition:background .2s}
.soc-btn:hover{background:var(--yellow-lt)}

/* ── MAIN ── */
#app{padding-top:var(--hh)}
.main{min-height:calc(100vh - var(--hh));padding:20px 14px 40px}

.section{display:none;animation:fadeUp .32s ease}
.section.active{display:block}

.sec-title-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.sec-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;color:var(--text)}
.sec-sub{color:var(--t3);font-size:.82rem;margin-bottom:18px}

.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(22,199,132,.12);color:var(--green);border:1px solid rgba(22,199,132,.25);border-radius:99px;padding:3px 10px;font-size:.72rem;font-weight:700;letter-spacing:.6px}
.pulse-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

/* ── COIN GRID ── */
.coin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:540px){.coin-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.coin-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1200px){.coin-grid{grid-template-columns:repeat(6,1fr)}}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,#ececec 25%,#f8f8f8 50%,#ececec 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:190px;border-radius:var(--r)}

/* COIN CARD */
.coin-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .22s,box-shadow .22s,border-color .22s;overflow:hidden;position:relative}
.coin-card:hover{transform:translateY(-4px) scale(1.015);box-shadow:var(--shadow-lg);border-color:rgba(247,198,0,.4)}
.coin-card:active{transform:scale(.98)}
.card-header{display:flex;align-items:center;gap:9px;padding:14px 14px 10px}
.card-logo{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--yellow-lt);border:2px solid var(--yellow-lt);flex-shrink:0}
.card-id .c-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.card-id .c-sym{font-size:.7rem;color:var(--t3);font-weight:500}
.card-live{position:absolute;top:10px;right:10px;display:flex;align-items:center;gap:4px;background:rgba(22,199,132,.1);color:var(--green);border-radius:99px;padding:2px 7px;font-size:.62rem;font-weight:700;letter-spacing:.5px}
.card-live span.dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.4s infinite}
.card-body{padding:0 14px 14px}
.card-price{font-family:'Syne',sans-serif;font-weight:700;font-size:1.0rem;color:var(--text);margin-bottom:4px}
.card-chg{display:inline-flex;align-items:center;gap:3px;font-size:.78rem;font-weight:600;padding:2px 8px;border-radius:99px;margin-bottom:10px}
.card-chg.up{background:rgba(22,199,132,.12);color:var(--green)}
.card-chg.dn{background:rgba(234,57,67,.1);color:var(--red)}
.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.card-meta-item{}
.cmi-label{font-size:.62rem;color:var(--t4);text-transform:uppercase;letter-spacing:.4px}
.cmi-val{font-size:.72rem;font-weight:600;color:var(--t2)}
.card-mini-chart{height:40px;padding:0 10px 10px;opacity:.75}

/* ── MODAL ── */
.token-modal{position:fixed;inset:0;z-index:600;visibility:hidden;pointer-events:none}
.token-modal.open{visibility:visible;pointer-events:all}
.modal-backdrop{position:absolute;inset:0;background:rgba(17,24,39,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;transition:opacity .3s}
.token-modal.open .modal-backdrop{opacity:1}
.modal-panel{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--r) var(--r) 0 0;box-shadow:0 -8px 48px rgba(0,0,0,.16);max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .38s cubic-bezier(.4,0,.2,1)}
.token-modal.open .modal-panel{transform:translateY(0)}
@media(min-width:700px){
  .modal-panel{bottom:auto;top:50%;left:50%;right:auto;transform:translate(-50%,30%);width:min(520px,95vw);border-radius:var(--r);max-height:88vh}
  .token-modal.open .modal-panel{transform:translate(-50%,-50%)}
}
.modal-drag{width:40px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.modal-token-row{display:flex;align-items:center;gap:13px}
.modal-logo{width:46px;height:46px;border-radius:50%;object-fit:cover;border:3px solid var(--yellow)}
.modal-tname{font-family:'Syne',sans-serif;font-weight:800;font-size:1.15rem}
.modal-tsym{color:var(--t3);font-size:.82rem;margin-top:1px}
.modal-close-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px;font-size:.85rem;transition:background .2s}
.modal-close-btn:hover{background:var(--yellow-lt)}
.modal-body{padding:0 20px 28px}
.modal-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:var(--bg);border-radius:var(--r-sm);padding:12px 14px;border:1px solid var(--border)}
.stat-label{display:block;font-size:.67rem;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.stat-value{font-family:'Syne',sans-serif;font-weight:700;font-size:.98rem;color:var(--text)}
.modal-chart-wrap{border-radius:var(--r);overflow:hidden;margin-bottom:16px;border:1px solid var(--border);background:#000}
.chart-label{background:var(--bg);padding:8px 14px;font-size:.75rem;font-weight:600;color:var(--t2);border-bottom:1px solid var(--border)}
.modal-chart{width:100%;height:300px;display:block;border:none}
.modal-contract{background:var(--bg);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px;border:1px solid var(--border)}
.contract-lbl{display:block;font-size:.67rem;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.contract-row{display:flex;align-items:center;gap:8px}
.contract-addr{font-size:.72rem;color:var(--t2);font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{padding:4px 10px;background:var(--yellow);border-radius:6px;font-size:.72rem;font-weight:600;transition:background .2s}
.copy-btn:hover{background:var(--yellow-dk)}
.modal-links{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.link-pill{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--blue-lt);color:var(--blue);border-radius:99px;font-size:.78rem;font-weight:600;transition:background .2s,transform .15s}
.link-pill:hover{background:var(--blue);color:#fff;transform:scale(1.04)}
.swap-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--yellow);border-radius:var(--r-sm);font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:var(--text);transition:background .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 20px rgba(247,198,0,.4)}
.swap-btn:hover{background:var(--yellow-dk);transform:translateY(-1px);box-shadow:0 6px 28px rgba(247,198,0,.5)}
.swap-btn:active{transform:scale(.98)}

/* SWAP MODAL */
.swap-modal{position:fixed;inset:0;z-index:700;visibility:hidden;pointer-events:none}
.swap-modal.open{visibility:visible;pointer-events:all}
.swap-panel{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--r) var(--r) 0 0;max-height:94vh;overflow:hidden;transform:translateY(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.swap-modal.open .swap-panel{transform:translateY(0)}
@media(min-width:700px){
  .swap-panel{bottom:auto;top:50%;left:50%;right:auto;transform:translate(-50%,30%);width:min(500px,95vw);border-radius:var(--r);max-height:90vh}
  .swap-modal.open .swap-panel{transform:translate(-50%,-50%)}
}
.swap-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.swap-head-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;display:flex;align-items:center;gap:8px}
.swap-body{flex:1;overflow:hidden;padding:16px}
#jupiter-iframe{border-radius:12px;border:1px solid var(--border)}

/* NEWS */
.news-grid{display:grid;gap:14px}
@media(min-width:600px){.news-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.news-grid{grid-template-columns:repeat(3,1fr)}}
.news-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer}
.news-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.news-img{width:100%;height:150px;object-fit:cover;background:var(--blue-lt)}
.news-img-placeholder{width:100%;height:150px;background:linear-gradient(135deg,var(--blue-lt),var(--yellow-lt));display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.news-content{padding:14px}
.news-source{font-size:.68rem;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.news-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;line-height:1.4;margin-bottom:8px;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.news-meta{display:flex;align-items:center;justify-content:space-between;font-size:.72rem;color:var(--t3)}
.news-open{font-size:.72rem;color:var(--blue);font-weight:600}

/* AIRDROPS / ALPHA */
.content-cards{display:grid;gap:12px}
@media(min-width:600px){.content-cards{grid-template-columns:repeat(2,1fr)}}
.content-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:18px;display:flex;flex-direction:column;gap:10px;transition:transform .2s}
.content-card:hover{transform:translateY(-3px)}
.cc-icon{font-size:2rem}
.cc-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.cc-desc{font-size:.84rem;color:var(--t2);line-height:1.5}
.cc-btn{align-self:flex-start;padding:8px 16px;background:var(--yellow);border-radius:var(--r-sm);font-weight:600;font-size:.82rem;transition:background .2s}
.cc-btn:hover{background:var(--yellow-dk)}

/* PARTNERS */
.partners-grid{display:grid;gap:14px}
@media(min-width:500px){.partners-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:800px){.partners-grid{grid-template-columns:repeat(3,1fr)}}
.partner-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:22px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;transition:transform .2s,box-shadow .2s}
.partner-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.pc-icon{font-size:2.5rem;width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:var(--yellow-lt);border-radius:14px;border:2px solid rgba(247,198,0,.3)}
.pc-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.pc-desc{font-size:.8rem;color:var(--t3);line-height:1.5}
.pc-tag{font-size:.68rem;padding:3px 10px;background:var(--blue-lt);color:var(--blue);border-radius:99px;font-weight:600}

/* SWAP SECTION */
.swap-section{display:flex;flex-direction:column;align-items:center;gap:16px;padding:30px 0;text-align:center}
.swap-section-desc{font-size:.9rem;color:var(--t2);max-width:320px;line-height:1.6}
.swap-section .swap-btn{max-width:260px;font-size:1.05rem;padding:15px 30px}

/* FOOTER */
.footer{text-align:center;padding:20px;font-size:.75rem;color:var(--t3);border-top:1px solid var(--border)}

/* MINI CHART SVG */
.mini-sparkline{width:100%;height:36px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* BADGE NEW */
.badge-new{background:var(--blue);color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:99px;letter-spacing:.5px}

/* ALPHA ITEMS */
.alpha-item{background:var(--card);border-radius:var(--r);border-left:4px solid var(--yellow);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:transform .18s}
.alpha-item:hover{transform:translateX(4px)}
.alpha-tag{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--blue);letter-spacing:.5px;margin-bottom:4px}
.alpha-text{font-size:.9rem;font-weight:600;line-height:1.45}
.alpha-time{font-size:.72rem;color:var(--t3);margin-top:5px}

</style>
</head>
